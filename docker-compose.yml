version: "3.9"

services:
  chat-with-docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat_with_pdfs
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data        # persist FAISS index between restarts
      - ./logs:/app/logs        # persist logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      mode: replicated
      replicas: 1
      